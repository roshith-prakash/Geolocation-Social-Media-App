name: geolocation_social_media
description: "FlashMap Social - A geolocation-based social media platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  google_sign_in: ^6.2.2

  # Supabase
  supabase_flutter: ^2.9.0

  # Maps & Location
  flutter_map: ^8.0.1
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # State Management
  provider: ^6.1.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - .env
